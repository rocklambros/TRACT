name: Bug Report
description: Report a bug in TRACT
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `python -m scripts.phase1a.build_hierarchy`
        2. Observe error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - Python version
        - OS
        - TRACT commit SHA or branch
      placeholder: |
        - Python 3.12.4
        - Ubuntu 24.04
        - main @ abc1234
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant error messages or stack traces.
      render: shell

  - type: checkboxes
    id: search
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
