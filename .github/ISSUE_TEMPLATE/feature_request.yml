name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement. Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the motivation?
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? What would the interface look like?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which part of TRACT does this affect?
      options:
        - Hierarchy / CRE taxonomy
        - Hub descriptions
        - Framework parsers
        - Training pipeline
        - Evaluation / metrics
        - CLI / tooling
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: search
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
